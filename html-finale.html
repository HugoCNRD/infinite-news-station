<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>INS HTML Final Generator</title>
<style>
body{background:#181624;color:white;font-family:Arial;padding:20px}
select,button,textarea{width:100%;margin-top:10px;padding:10px}
textarea{height:500px}
</style>
</head>

<body>

<script>
const password=prompt("Editor Password");
if(password!=="ARENDIUZTHEGOAT"){
  alert("Access denied");
  location.href="https://hugocnrd.github.io/infinite-news-station/home.html";
}
</script>

<h1>INS HTML Final Generator</h1>

<select id="articles"></select>
<button onclick="loadArticle()">Generate Full HTML</button>
<button onclick="copyHTML()">Copy HTML</button>
<button onclick="clearHTML()">Clear Box</button>

<div id="filename"></div>
<textarea id="output"></textarea>

<script>
const API="https://ins-api-proxy.hugobatigne.workers.dev/";

let HEADER="";
let FOOTER="";

fetch("article-header.txt").then(r=>r.text()).then(h=>HEADER=h);
fetch("article-footer.txt").then(r=>r.text()).then(f=>FOOTER=f);

let allArticles=[];

fetch(API)
  .then(r => r.text())
  .then(t => {
    const data = JSON.parse(t);

    allArticles = data;

    const s = document.getElementById('articles');
    s.innerHTML = "";

    data.forEach((a, i) => {
      let o = document.createElement('option');
      o.value = i;
      o.textContent = a.title;
      s.appendChild(o);
    });
  });

function loadArticle(){
  const a=allArticles[document.getElementById('articles').value];
  if(!a)return;
  document.getElementById('filename').textContent='Filename: '+a.slug;
  document.getElementById('output').value=HEADER+a.html+"\n\n"+FOOTER;
}

function copyHTML(){
  navigator.clipboard.writeText(document.getElementById('output').value);
  alert('Copied');
}

function clearHTML(){
  document.getElementById('output').value='';
}
</script>

</body>
</html>
